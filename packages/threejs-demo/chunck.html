<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Chunk Grid Example</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/utils/BufferGeometryUtils.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.min.js"></script>
    <!-- stats.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script>
        // import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js'
        // import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.min.js'

        // 场景、相机、渲染器初始化
        const scene = new THREE.Scene()
        scene.background = new THREE.Color('#222')

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
        camera.position.set(0, 60, 100)
        camera.lookAt(0, 0, 0)

        const renderer = new THREE.WebGLRenderer({ antialias: true })
        renderer.setSize(window.innerWidth, window.innerHeight)
        document.body.appendChild(renderer.domElement)

        const controls = new THREE.OrbitControls(camera, renderer.domElement)
        controls.enableDamping = true

        // 基础光照
        scene.add(new THREE.AmbientLight(0xffffff, 0.3))
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8)
        dirLight.position.set(50, 100, 50)
        scene.add(dirLight)

        // 参数
        const chunkSize = 10
        const cubeSize = 1
        const chunksPerAxis = 10  // 10 x 10 chunks
        const gridChunks = []
        const loaderDistance = 100
        const axesHelper = new THREE.AxesHelper(20)
        scene.add(axesHelper)
        const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize)
        const material = new THREE.MeshStandardMaterial({ color: 0x00ffaa })

        // 生成中心对齐的 chunks
        const offset = (chunksPerAxis * chunkSize * cubeSize) / 2

        for (let cx = 0; cx < chunksPerAxis; cx++) {
            for (let cz = 0; cz < chunksPerAxis; cz++) {
                // 100个块  1个块100个正方体
                const mesh = new THREE.InstancedMesh(geometry, material, chunkSize * chunkSize)
                let i = 0

                for (let x = 0; x < chunkSize; x++) {
                    for (let z = 0; z < chunkSize; z++) {
                        const matrix = new THREE.Matrix4()
                        const worldX = (cx * chunkSize + x) * cubeSize - offset
                        const worldZ = (cz * chunkSize + z) * cubeSize - offset
                        matrix.setPosition(worldX, 0, worldZ)
                        mesh.setMatrixAt(i++, matrix)
                    }
                }

                mesh.instanceMatrix.needsUpdate = true
                mesh.userData.gridIndex = { x: cx, z: cz }
                mesh.visible = false
                scene.add(mesh)
                gridChunks.push(mesh)
            }
        }

        // 距离判断启用 chunk
        function updateChunks() {
            gridChunks.forEach(chunk => {
                const { x, z } = chunk.userData.gridIndex
                const center = new THREE.Vector3(
                    (x + 0.5) * chunkSize * cubeSize - offset,
                    0,
                    (z + 0.5) * chunkSize * cubeSize - offset
                )
                const dist = camera.position.distanceTo(center)
                chunk.visible = dist < loaderDistance
            })
        }

        function animate() {
            requestAnimationFrame(animate)
            controls.update()
            updateChunks()
            renderer.render(scene, camera)
        }

        animate()

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight
            camera.updateProjectionMatrix()
            renderer.setSize(window.innerWidth, window.innerHeight)
        })
    </script>
</body>

</html>
